<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFFICE VIEW PRO - AR Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .sticky-header { position: sticky; top: 0; z-index: 10; }
        .word-content { padding: 40px; line-height: 1.6; }
        .word-content table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .word-content td, .word-content th { border: 1px solid #e2e8f0; padding: 8px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 flex flex-col">

    <div class="flex-grow max-w-6xl mx-auto p-4 md:p-8 w-full">
        <div class="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-slate-200 mb-6">
            <div class="text-center mb-6">
                <h1 class="text-3xl font-black text-blue-600 tracking-tighter uppercase italic">OFFICE VIEW PRO</h1>
                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">Solusi cepat buka .xlsx, .xls & .docx secara instan</p>
            </div>
            
            <div class="flex flex-col md:flex-row gap-4 justify-center items-center">
                <input type="file" id="fileInput" accept=".xlsx, .xls, .csv, .docx" 
                    class="block w-full max-w-xs text-xs text-slate-500 file:mr-4 file:py-3 file:px-8 file:rounded-full file:border-0 file:text-[10px] file:font-black file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer shadow-md"/>
                
                <input type="text" id="searchInput" placeholder="Cari data (Anti-Lag)..." 
                    class="p-3 px-6 rounded-full bg-slate-100 border-none outline-none text-xs font-bold focus:ring-2 focus:ring-blue-400 w-full md:w-64 hidden shadow-inner">
            </div>
        </div>

        <div id="viewContainer" class="bg-white rounded-[2rem] shadow-xl overflow-hidden border border-slate-200 hidden">
            <div id="excelWrapper" class="overflow-x-auto max-h-[70vh] hidden">
                <table id="excelTable" class="w-full text-left text-[11px] border-collapse"></table>
            </div>
            <div id="wordWrapper" class="word-content overflow-y-auto max-h-[70vh] hidden"></div>
        </div>

        <div id="placeholder" class="h-64 border-4 border-dashed border-slate-200 rounded-[3rem] flex flex-col items-center justify-center text-slate-300 italic">
            <div id="loadingIcon" class="hidden mb-4 italic text-blue-600 font-bold animate-pulse">Membaca Dokumen...</div>
            <span class="text-5xl mb-2 opacity-20">📂</span>
            <p class="font-black uppercase tracking-widest text-[10px] opacity-40">Pilih Dokumen Anda</p>
        </div>
    </div>

    <footer class="p-6 text-center">
        <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">
            Build by <span class="text-slate-800">Ayub R</span> • 2026 • <span class="text-blue-600">AR Developer</span>
        </p>
    </footer>

    <script>
        let fullData = [];
        let timeout = null;

        // FUNGSI FORMAT ANGKA (TITIK RIBUAN)
        function formatNumber(val) {
            if (val === "" || isNaN(val) || val === null) return val;
            let num = parseFloat(val);
            // Hanya format jika angka bulat besar atau desimal tertentu (bukan tahun/ID)
            if (num > 999 || num < -999) {
                return num.toLocaleString('id-ID');
            }
            return val;
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const placeholder = document.getElementById('placeholder');
            const loadingIcon = document.getElementById('loadingIcon');
            const viewContainer = document.getElementById('viewContainer');
            const excelWrapper = document.getElementById('excelWrapper');
            const wordWrapper = document.getElementById('wordWrapper');

            loadingIcon.classList.remove('hidden');
            placeholder.querySelector('p').innerText = "Memproses " + file.name;

            const reader = new FileReader();

            // LOGIKA WORD (.docx)
            if (file.name.endsWith(".docx")) {
                reader.onload = function(e) {
                    mammoth.convertToHtml({arrayBuffer: e.target.result})
                        .then(function(result) {
                            wordWrapper.innerHTML = result.value;
                            wordWrapper.classList.remove('hidden');
                            excelWrapper.classList.add('hidden');
                            viewContainer.classList.remove('hidden');
                            placeholder.classList.add('hidden');
                            document.getElementById('searchInput').classList.add('hidden');
                        });
                };
                reader.readAsArrayBuffer(file);
            } 
            // LOGIKA EXCEL (.xlsx, .xls, .csv)
            else {
                reader.onload = function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, {type: 'array', cellDates: true});
                        const sheet = workbook.Sheets[workbook.SheetNames[0]];
                        
                        // Konversi data & Terapkan format angka titik
                        const rawData = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: ""});
                        fullData = rawData.map(row => row.map(cell => formatNumber(cell)));

                        renderTable(fullData);
                        
                        excelWrapper.classList.remove('hidden');
                        wordWrapper.classList.add('hidden');
                        viewContainer.classList.remove('hidden');
                        placeholder.classList.add('hidden');
                        document.getElementById('searchInput').classList.remove('hidden');
                    } catch (err) {
                        alert("Gagal membaca file Excel.");
                        loadingIcon.classList.add('hidden');
                    }
                };
                reader.readAsArrayBuffer(file);
            }
        });

        // SEARCH ANTI-LAG
        document.getElementById('searchInput').addEventListener('input', function(e) {
            clearTimeout(timeout);
            const keyword = e.target.value.toLowerCase();
            timeout = setTimeout(() => {
                const filtered = fullData.filter((row, i) => {
                    if (i === 0) return true;
                    return row.some(cell => String(cell).toLowerCase().includes(keyword));
                });
                renderTable(filtered);
            }, 300);
        });

        function renderTable(data) {
            const table = document.getElementById('excelTable');
            table.innerHTML = data.map((row, i) => `
                <tr class="${i === 0 ? 'bg-slate-900 text-white font-bold sticky-header' : 'border-b border-slate-50 hover:bg-blue-50'}">
                    ${row.map(cell => `<td class="p-4 border-r border-slate-50 min-w-[140px] whitespace-nowrap">${cell}</td>`).join('')}
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
