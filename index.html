<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Viewer Pro - Ayub R</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    
    <style>
        /* Custom scrollbar agar lebih cantik */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Styling Tabel Excel agar seperti Spreadsheet asli */
        .excel-container table { border-collapse: collapse; width: 100%; min-width: max-content; }
        .excel-container th { 
            background-color: #3b82f6; 
            color: white; 
            position: sticky; 
            top: 0; 
            z-index: 10;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
        }
        .excel-container th, .excel-container td { 
            border: 1px solid #e2e8f0; 
            padding: 12px 15px; 
            text-align: left; 
        }
        .excel-container tr:nth-child(even) { background-color: #f8fafc; }
        .excel-container tr:hover { background-color: #eff6ff; transition: 0.2s; }
        
        /* Container untuk scroll tabel */
        .excel-wrapper { 
            overflow: auto; 
            border-radius: 8px; 
            border: 1px solid #e2e8f0;
            max-height: 65vh;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8 text-center md:text-left md:flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-black text-blue-600 tracking-tight">OFFICE VIEW PRO</h1>
                <p class="text-slate-500 mt-1">Solusi cepat buka .xlsx & .docx secara instan</p>
            </div>
            <div class="mt-4 md:mt-0">
                <label for="fileInput" class="inline-flex items-center px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl cursor-pointer shadow-lg shadow-blue-200 transition-all active:scale-95">
                    <span>📁 Pilih File</span>
                    <input type="file" id="fileInput" accept=".xlsx, .docx" class="hidden"/>
                </label>
            </div>
        </header>

        <div id="searchBox" class="hidden mb-6 animate-pulse-once">
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <input type="text" id="searchInput" placeholder="Cari data di tabel... (Anti-Lag Aktif)" 
                       class="w-full pl-12 pr-4 py-4 bg-white border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none shadow-sm transition-all text-lg">
            </div>
        </div>

        <main id="viewer" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 min-h-[500px] flex items-center justify-center relative">
            <div id="placeholder" class="text-center opacity-60">
                <div class="bg-slate-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-10 h-10 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <p class="text-lg font-medium text-slate-400">Belum ada file yang dipilih</p>
                <p class="text-sm text-slate-400">Aplikasi ini berjalan 100% di browser Anda (Privasi Terjaga)</p>
            </div>
        </main>
        
        <footer class="mt-8 text-center text-slate-400 text-xs">
            Build by Ayub R &bull; 2026 &bull; Power by SheetJS & Mammoth.js
        </footer>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const viewer = document.getElementById('viewer');
        const searchBox = document.getElementById('searchBox');
        const searchInput = document.getElementById('searchInput');
        const placeholder = document.getElementById('placeholder');

        // Handler untuk Pilih File
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const fileName = file.name.toLowerCase();
            const reader = new FileReader();
            
            // Loading State
            viewer.innerHTML = `
                <div class="flex flex-col items-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-100 border-t-blue-600 mb-4"></div>
                    <p class="text-blue-600 font-bold">Membaca Dokumen...</p>
                </div>`;
            searchBox.classList.add('hidden');
            searchInput.value = '';

            // Proses File Excel
            if (fileName.endsWith('.xlsx')) {
                reader.onload = function(e) {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const firstSheet = workbook.SheetNames[0];
                    const htmlTable = XLSX.utils.sheet_to_html(workbook.Sheets[firstSheet]);
                    
                    viewer.classList.remove('flex', 'items-center', 'justify-center');
                    viewer.innerHTML = `<div class="excel-wrapper excel-container">${htmlTable}</div>`;
                    searchBox.classList.remove('hidden'); 
                };
                reader.readAsArrayBuffer(file);

            // Proses File Word
            } else if (fileName.endsWith('.docx')) {
                reader.onload = function(e) {
                    mammoth.convertToHtml({arrayBuffer: e.target.result})
                        .then(result => {
                            viewer.classList.remove('flex', 'items-center', 'justify-center');
                            viewer.innerHTML = `<div class="prose prose-slate max-w-none p-4 md:p-8 mx-auto">${result.value}</div>`;
                        })
                        .catch(err => {
                            viewer.innerHTML = `<div class="text-red-500 font-bold">Gagal memproses file Word!</div>`;
                        });
                };
                reader.readAsArrayBuffer(file);
            }
        });

        // OPTIMASI PENCARIAN (DEBOUNCING + ANTI-LAG)
        let typingTimer;
        const doneTypingInterval = 300; // Delay 300ms agar browser tidak freeze saat ngetik cepat

        searchInput.addEventListener('keyup', function() {
            clearTimeout(typingTimer);
            
            typingTimer = setTimeout(() => {
                const filter = searchInput.value.toLowerCase();
                const rows = viewer.querySelectorAll('.excel-container tr');
                
                if (rows.length === 0) return;

                // Menggunakan requestAnimationFrame untuk menjaga performa scrolling/UI
                requestAnimationFrame(() => {
                    for (let i = 1; i < rows.length; i++) { // Skip header index 0
                        const row = rows[i];
                        // textContent lebih cepat dari innerText untuk data besar
                        const text = row.textContent.toLowerCase();
                        row.style.display = text.includes(filter) ? "" : "none";
                    }
                });
            }, doneTypingInterval);
        });
    </script>
</body>
</html>
