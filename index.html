<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFFICE VIEW PRO - AR Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* FIX: HEADER DENGAN TEKS PUTIH TERANG (SANGAT JELAS) */
        .sticky-header { 
            position: sticky; 
            top: 0; 
            z-index: 10; 
            background-color: #0f172a !important; 
            font-weight: 800;
            text-transform: uppercase;
        }
        /* Memastikan semua sel di header berwarna putih */
        .sticky-header td {
            color: #ffffff !important; 
            border-bottom: 2px solid #334155 !important;
        }

        /* TAMPILAN TABEL EXCEL */
        #excelTable { border-collapse: separate; border-spacing: 0; }
        #excelTable tr:nth-child(even) { background-color: #f8fafc; }
        #excelTable td { 
            white-space: nowrap; 
            border-right: 1px solid #e2e8f0; 
            border-bottom: 1px solid #e2e8f0;
            padding: 14px 16px;
            font-weight: 600; 
            color: #1e293b;
            cursor: pointer;
        }

        /* KLIK BIRU TERANG (KONTRAST TINGGI) */
        .row-active { 
            background-color: #2563eb !important; 
        }
        .row-active td { 
            color: #ffffff !important; 
            font-weight: 800 !important;
        }

        /* PDF HD Scroll */
        #pdfWrapper { width: 100%; max-height: 75vh; overflow: auto; background: #cbd5e1; border-radius: 1.5rem; }
        #pdfCanvasContainer { display: flex; flex-direction: column; items: center; gap: 20px; padding: 20px; }
        canvas { box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3); border-radius: 4px; max-width: none !important; }
        
        .doc-content { padding: 30px; line-height: 1.6; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 flex flex-col">

    <div class="flex-grow max-w-6xl mx-auto p-4 md:p-8 w-full text-center">
        <div class="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-slate-200 mb-6 text-center">
            <h1 class="text-3xl font-black text-blue-600 tracking-tighter uppercase italic leading-none">OFFICE VIEW PRO</h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-2 font-black">PDF • WORD • EXCEL • CSV | AR DEVELOPER 2026</p>
            
            <div class="flex flex-col md:flex-row gap-4 justify-center items-center mt-8">
                <button onclick="document.getElementById('fileInput').click()" 
                    class="bg-blue-600 text-white font-black text-xs py-4 px-10 rounded-full shadow-lg active:scale-95 transition-all">
                    📂 PILIH DOKUMEN
                </button>
                <input type="file" id="fileInput" accept=".xlsx, .xls, .csv, .docx, .doc, .pdf" class="hidden" />
                
                <input type="text" id="searchInput" placeholder="Cari data (Anti-Lag)..." 
                    class="p-4 px-6 rounded-full bg-slate-100 border-none outline-none text-xs font-bold focus:ring-2 focus:ring-blue-400 w-full md:w-64 hidden shadow-inner border border-slate-200">
            </div>
        </div>

        <div id="viewContainer" class="bg-white rounded-[2rem] shadow-xl overflow-hidden border border-slate-200 hidden">
            <div id="excelWrapper" class="overflow-x-auto max-h-[75vh] hidden">
                <table id="excelTable" class="w-full text-left text-[12px]"></table>
            </div>
            <div id="wordWrapper" class="doc-content overflow-y-auto max-h-[75vh] hidden text-left bg-white"></div>
            <div id="pdfWrapper" class="hidden"><div id="pdfCanvasContainer"></div></div>
        </div>

        <div id="placeholder" class="h-64 border-4 border-dashed border-slate-200 rounded-[3rem] flex flex-col items-center justify-center text-slate-300 italic p-4 text-center">
            <div id="loadingIcon" class="hidden mb-4 italic text-blue-600 font-bold animate-pulse text-xs text-center"><span>Memproses...</span></div>
            <span class="text-5xl mb-2 opacity-20">📂</span>
            <p class="font-black uppercase tracking-widest text-[10px] opacity-40 leading-relaxed">Header diperbaiki (Teks Putih) & Baris Biru Terang</p>
        </div>
    </div>

    <footer class="p-6 text-center">
        <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">
            Build by <span class="text-slate-800">Ayub R</span> • 2026 • <span class="text-blue-600">AR Developer</span>
        </p>
    </footer>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        let fullData = [];
        let timeout = null;

        function formatNumber(val) {
            if (val === "" || isNaN(val) || val === null || typeof val === 'object') return val;
            let num = parseFloat(val);
            if (num > 999 || num < -999) return num.toLocaleString('id-ID');
            return val;
        }

        function toggleRowColor(rowElement) {
            document.querySelectorAll('#excelTable tr').forEach(tr => tr.classList.remove('row-active'));
            rowElement.classList.add('row-active');
        }

        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const placeholder = document.getElementById('placeholder');
            const loadingIcon = document.getElementById('loadingIcon');
            const viewContainer = document.getElementById('viewContainer');
            const excelWrapper = document.getElementById('excelWrapper');
            const wordWrapper = document.getElementById('wordWrapper');
            const pdfWrapper = document.getElementById('pdfWrapper');
            const searchInput = document.getElementById('searchInput');

            loadingIcon.classList.remove('hidden');
            [excelWrapper, wordWrapper, pdfWrapper].forEach(el => el.classList.add('hidden'));

            if (file.type === "application/pdf" || file.name.endsWith(".pdf")) {
                const reader = new FileReader();
                reader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    const container = document.getElementById('pdfCanvasContainer');
                    container.innerHTML = ''; 
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const viewport = page.getViewport({scale: 2.0}); 
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;
                        await page.render({canvasContext: context, viewport: viewport}).promise;
                        container.appendChild(canvas);
                    }
                    pdfWrapper.classList.remove('hidden');
                    viewContainer.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    searchInput.classList.add('hidden');
                    loadingIcon.classList.add('hidden');
                };
                reader.readAsArrayBuffer(file);
            } 
            else if (file.name.endsWith(".docx") || file.name.endsWith(".doc")) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    mammoth.convertToHtml({arrayBuffer: e.target.result})
                        .then(function(result) {
                            wordWrapper.innerHTML = result.value;
                            wordWrapper.classList.remove('hidden');
                            viewContainer.classList.remove('hidden');
                            placeholder.classList.add('hidden');
                            searchInput.classList.add('hidden');
                            loadingIcon.classList.add('hidden');
                        });
                };
                reader.readAsArrayBuffer(file);
            } 
            else {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, {type: 'array', cellDates: true});
                        const sheet = workbook.Sheets[workbook.SheetNames[0]];
                        const rawData = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: ""});
                        fullData = rawData.map(row => row.map(cell => formatNumber(cell)));
                        renderTable(fullData);
                        excelWrapper.classList.remove('hidden');
                        viewContainer.classList.remove('hidden');
                        placeholder.classList.add('hidden');
                        searchInput.classList.remove('hidden');
                        loadingIcon.classList.add('hidden');
                    } catch (err) { alert("Gagal membaca Excel."); }
                };
                reader.readAsArrayBuffer(file);
            }
        });

        document.getElementById('searchInput').addEventListener('input', function(e) {
            clearTimeout(timeout);
            const keyword = e.target.value.toLowerCase();
            timeout = setTimeout(() => {
                const filtered = fullData.filter((row, i) => {
                    if (i === 0) return true;
                    return row.some(cell => String(cell).toLowerCase().includes(keyword));
                });
                renderTable(filtered);
            }, 300);
        });

        function renderTable(data) {
            const table = document.getElementById('excelTable');
            table.innerHTML = data.map((row, i) => `
                <tr onclick="${i === 0 ? '' : 'toggleRowColor(this)'}" class="${i === 0 ? 'sticky-header' : 'hover:bg-slate-50 transition-colors'}">
                    ${row.map(cell => `<td>${cell}</td>`).join('')}
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
