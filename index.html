<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Viewer Pro - All Formats & Anti Lag</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .sticky-header { position: sticky; top: 0; z-index: 10; }
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 pb-10">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <div class="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-slate-200 mb-6">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                <div>
                    <h1 class="text-2xl font-black text-slate-800 tracking-tighter uppercase italic leading-none">Office<span class="text-blue-600">Viewer</span></h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-2">Support: .XLSX .XLS .CSV | High Performance</p>
                </div>
                
                <div class="flex flex-col sm:flex-row gap-3">
                    <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" 
                        class="block w-full text-xs text-slate-500 file:mr-4 file:py-2.5 file:px-6 file:rounded-full file:border-0 file:text-[10px] file:font-black file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer transition-all"/>
                    
                    <input type="text" id="searchInput" placeholder="Cari data (Anti-Lag)..." 
                        class="p-3 px-6 rounded-full bg-slate-100 border-none outline-none text-xs font-bold focus:ring-2 focus:ring-blue-400 w-full sm:w-64 hidden shadow-inner">
                </div>
            </div>
        </div>

        <div id="tableContainer" class="bg-white rounded-[2rem] shadow-xl overflow-hidden border border-slate-200 hidden">
            <div class="overflow-x-auto max-h-[70vh]">
                <table id="excelTable" class="w-full text-left text-[11px] border-collapse">
                    </table>
            </div>
        </div>

        <div id="placeholder" class="h-80 border-4 border-dashed border-slate-200 rounded-[3rem] flex flex-col items-center justify-center text-slate-300 italic p-8 text-center">
            <div id="loadingIcon" class="hidden mb-4">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-100 border-b-blue-600"></div>
            </div>
            <span class="text-5xl mb-4 opacity-20">📄</span>
            <p class="font-black uppercase tracking-widest text-xs opacity-40">Pilih file Excel (Lama/Baru) untuk memulai</p>
        </div>
    </div>

    <script>
        let fullData = [];
        let timeout = null;

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Show Loading UI
            const placeholder = document.getElementById('placeholder');
            const loadingIcon = document.getElementById('loadingIcon');
            placeholder.querySelector('p').innerText = "Sedang memproses file...";
            loadingIcon.classList.remove('hidden');

            const reader = new FileReader();
            
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    
                    // Logic: Support .xls (Legacy) & .xlsx (Modern)
                    const workbook = XLSX.read(data, {
                        type: 'array',
                        cellDates: true, // Biar tanggal tidak jadi angka aneh
                        cellNF: false,
                        cellText: false
                    });

                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    
                    // Konversi ke Array untuk Pencarian Cepat Anti-Lag
                    fullData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });
                    
                    renderTable(fullData);
                    
                    document.getElementById('searchInput').classList.remove('hidden');
                    document.getElementById('tableContainer').classList.remove('hidden');
                    placeholder.classList.add('hidden');
                } catch (err) {
                    alert("Error: Gagal membaca file. Pastikan format benar (.xls/.xlsx)");
                    console.error(err);
                    loadingIcon.classList.add('hidden');
                    placeholder.querySelector('p').innerText = "Gagal memuat file.";
                }
            };

            reader.readAsArrayBuffer(file);
        });

        // FITUR SEARCH ANTI-LAG (DEBOUNCE)
        document.getElementById('searchInput').addEventListener('input', function(e) {
            clearTimeout(timeout);
            const keyword = e.target.value.toLowerCase();
            
            // Tunggu 300ms agar tidak lag saat mengetik
            timeout = setTimeout(() => {
                const filtered = fullData.filter((row, index) => {
                    if (index === 0) return true; // Selalu tampilkan header
                    return row.some(cell => String(cell).toLowerCase().includes(keyword));
                });
                renderTable(filtered);
            }, 300);
        });

        function renderTable(data) {
            const tableElement = document.getElementById('excelTable');
            if (data.length === 0) return;

            tableElement.innerHTML = data.map((row, i) => `
                <tr class="${i === 0 ? 'bg-slate-900 text-white font-bold sticky-header' : 'border-b border-slate-50 hover:bg-blue-50 transition-colors'}">
                    ${row.map(cell => `
                        <td class="p-4 border-r border-slate-50 min-w-[140px] whitespace-nowrap overflow-hidden text-ellipsis">
                            ${cell}
                        </td>
                    `).join('')}
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
