<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFFICE VIEW PRO - AR Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .sticky-header { position: sticky; top: 0; z-index: 10; }
        .doc-content { padding: 30px; line-height: 1.6; }
        #pdfCanvasContainer { width: 100%; display: flex; flex-direction: column; items: center; gap: 10px; padding: 10px; background: #e2e8f0; }
        canvas { max-width: 100%; height: auto; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border-radius: 8px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 flex flex-col">

    <div class="flex-grow max-w-6xl mx-auto p-4 md:p-8 w-full text-center">
        <div class="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-slate-200 mb-6">
            <h1 class="text-3xl font-black text-blue-600 tracking-tighter uppercase italic leading-none">OFFICE VIEW PRO</h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-2">PDF • WORD • EXCEL • CSV | AR DEVELOPER 2026</p>
            
            <div class="flex flex-col md:flex-row gap-4 justify-center items-center mt-8">
                <button onclick="document.getElementById('fileInput').click()" 
                    class="bg-blue-600 text-white font-black text-xs py-4 px-10 rounded-full shadow-lg active:scale-95 transition-all">
                    📂 PILIH DOKUMEN
                </button>
                <input type="file" id="fileInput" accept=".xlsx, .xls, .csv, .docx, .doc, .pdf" class="hidden" />
                <input type="text" id="searchInput" placeholder="Cari data Excel..." 
                    class="p-4 px-6 rounded-full bg-slate-100 border-none outline-none text-xs font-bold focus:ring-2 focus:ring-blue-400 w-full md:w-64 hidden shadow-inner">
            </div>
        </div>

        <div id="viewContainer" class="bg-white rounded-[2rem] shadow-xl overflow-hidden border border-slate-200 hidden">
            <div id="excelWrapper" class="overflow-x-auto max-h-[75vh] hidden text-[11px]"><table id="excelTable" class="w-full text-left border-collapse"></table></div>
            <div id="wordWrapper" class="doc-content overflow-y-auto max-h-[75vh] hidden text-left"></div>
            <div id="pdfWrapper" class="hidden max-h-[75vh] overflow-y-auto">
                <div id="pdfCanvasContainer"></div>
            </div>
        </div>

        <div id="placeholder" class="h-64 border-4 border-dashed border-slate-200 rounded-[3rem] flex flex-col items-center justify-center text-slate-300 italic p-4">
            <div id="loadingIcon" class="hidden mb-4 italic text-blue-600 font-bold animate-pulse text-xs text-center">
                <span>Memproses Dokumen...</span>
            </div>
            <span class="text-5xl mb-2 opacity-20">📄</span>
            <p class="font-black uppercase tracking-widest text-[10px] opacity-40">Tampilan akan muncul di sini</p>
        </div>
    </div>

    <footer class="p-6 text-center">
        <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">
            Build by <span class="text-slate-800">Ayub R</span> • 2026 • <span class="text-blue-600">AR Developer</span>
        </p>
    </footer>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        let fullData = [];
        let timeout = null;

        function formatNumber(val) {
            if (val === "" || isNaN(val) || val === null || typeof val === 'object') return val;
            let num = parseFloat(val);
            if (num > 999 || num < -999) return num.toLocaleString('id-ID');
            return val;
        }

        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const placeholder = document.getElementById('placeholder');
            const loadingIcon = document.getElementById('loadingIcon');
            const viewContainer = document.getElementById('viewContainer');
            const excelWrapper = document.getElementById('excelWrapper');
            const wordWrapper = document.getElementById('wordWrapper');
            const pdfWrapper = document.getElementById('pdfWrapper');
            const searchInput = document.getElementById('searchInput');

            loadingIcon.classList.remove('hidden');
            [excelWrapper, wordWrapper, pdfWrapper].forEach(el => el.classList.add('hidden'));

            if (file.type === "application/pdf" || file.name.endsWith(".pdf")) {
                const reader = new FileReader();
                reader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    const container = document.getElementById('pdfCanvasContainer');
                    container.innerHTML = ''; // Bersihkan canvas lama

                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const viewport = page.getViewport({scale: 1.5});
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;
                        await page.render({canvasContext: context, viewport: viewport}).promise;
                        container.appendChild(canvas);
                    }
                    pdfWrapper.classList.remove('hidden');
                    viewContainer.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    loadingIcon.classList.add('hidden');
                };
                reader.readAsArrayBuffer(file);
            } 
            else if (file.name.endsWith(".docx") || file.name.endsWith(".doc")) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    mammoth.convertToHtml({arrayBuffer: e.target.result})
                        .then(function(result) {
                            wordWrapper.innerHTML = result.value;
                            wordWrapper.classList.remove('hidden');
                            viewContainer.classList.remove('hidden');
                            placeholder.classList.add('hidden');
                            loadingIcon.classList.add('hidden');
                        });
                };
                reader.readAsArrayBuffer(file);
            } 
            else {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array', cellDates: true});
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rawData = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: ""});
                    fullData = rawData.map(row => row.map(cell => formatNumber(cell)));
                    renderTable(fullData);
                    excelWrapper.classList.remove('hidden');
                    viewContainer.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    searchInput.classList.remove('hidden');
                    loadingIcon.classList.add('hidden');
                };
                reader.readAsArrayBuffer(file);
            }
        });

        function renderTable(data) {
            const table = document.getElementById('excelTable');
            table.innerHTML = data.map((row, i) => `
                <tr class="${i === 0 ? 'bg-slate-900 text-white font-bold sticky-header' : 'border-b border-slate-50 hover:bg-blue-50'}">
                    ${row.map(cell => `<td class="p-4 border-r border-slate-50 min-w-[140px] whitespace-nowrap">${cell}</td>`).join('')}
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
