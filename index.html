<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Web Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
</head>
<body class="bg-gray-100 p-5">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-4 text-center">Buka File Excel & Word</h1>
        
        <input type="file" id="fileInput" accept=".xlsx, .docx" 
               class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 mb-6"/>

        <div id="viewer" class="border-t pt-4 overflow-auto max-h-[600px]">
            <p class="text-gray-400 text-center italic">Belum ada file yang dipilih...</p>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const viewer = document.getElementById('viewer');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const fileName = file.name.toLowerCase();
            const reader = new FileReader();

            if (fileName.endsWith('.xlsx')) {
                // LOGIKA EXCEL
                reader.onload = function(e) {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const firstSheet = workbook.SheetNames[0];
                    const jsonData = XLSX.utils.sheet_to_html(workbook.Sheets[firstSheet]);
                    viewer.innerHTML = `<div class="excel-table">${jsonData}</div>`;
                };
                reader.readAsArrayBuffer(file);

            } else if (fileName.endsWith('.docx')) {
                // LOGIKA WORD
                reader.onload = function(e) {
                    mammoth.convertToHtml({arrayBuffer: e.target.result})
                        .then(result => {
                            viewer.innerHTML = `<div class="prose max-w-none p-4">${result.value}</div>`;
                        })
                        .catch(err => console.error(err));
                };
                reader.readAsArrayBuffer(file);
            }
        });
    </script>

    <style>
        /* Styling agar tabel Excel terlihat rapi */
        table { border-collapse: collapse; width: 100%; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</body>
</html>
